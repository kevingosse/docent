name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + tag
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${{ inputs.version }}' must be X.Y.Z (e.g. 0.2.0)"
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/wrapper-validation@v4

      - uses: gradle/actions/setup-gradle@v4

      # Override pluginVersion for this build only (no commit back); the released zip carries the
      # requested version. As with the Build workflow, Rider + the workbench are downloaded.
      - run: ./gradlew buildPlugin -PpluginVersion=${{ inputs.version }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${{ inputs.version }}"
          build/distributions/*.zip
          --title "v${{ inputs.version }}"
          --generate-notes
