name: Verify (cross-IDE)

# Manual only. The Plugin Verifier downloads full IDE distributions (~1.3 GB) and takes ~8 min, so
# it's deliberately NOT run per-commit — run it on demand before a release, or after touching code
# that uses platform APIs, to confirm the plugin still loads on non-Rider IntelliJ IDEs. The set of
# IDEs and the externalPrefixes/failureLevel live in build.gradle.kts (pluginVerification block).
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew verifyPlugin

      # The human-readable per-IDE reports (kept even if verification fails).
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-report
          path: build/reports/pluginVerifier/
          if-no-files-found: warn
