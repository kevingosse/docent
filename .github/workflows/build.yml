name: Build

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Verifies the Gradle wrapper jar against known-good checksums before we run it.
      - uses: gradle/actions/wrapper-validation@v4

      - uses: gradle/actions/setup-gradle@v4

      # No local Rider / Agent Workbench on the runner, so the build downloads the Rider build named
      # by `riderVersion` and resolves the workbench from the Marketplace (see build.gradle.kts).
      - run: ./gradlew buildPlugin

      - uses: actions/upload-artifact@v4
        with:
          name: code-review-docent
          path: build/distributions/*.zip
          if-no-files-found: error
